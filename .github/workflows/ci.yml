name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      typescript: ${{ steps.filter.outputs.typescript }}
      ttsd: ${{ steps.filter.outputs.ttsd }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'src-tauri/**'
              - '.github/workflows/ci.yml'
            typescript:
              - 'src/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'vite.config.ts'
              - 'index.html'
              - '.github/workflows/ci.yml'
            ttsd:
              - 'ttsd/**'
              - '.github/workflows/ci.yml'

  rust:
    name: Rust (clippy + test)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libgtk-3-dev \
            librsvg2-dev libayatana-appindicator3-dev \
            libmpv-dev pkg-config build-essential
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --no-deps -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml --all-features

  typescript:
    name: TypeScript (typecheck)
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  ttsd:
    name: ttsd (ruff + pytest)
    needs: changes
    if: needs.changes.outputs.ttsd == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - working-directory: ttsd
        run: uv sync --group dev
      - working-directory: ttsd
        run: uv run ruff check
      - working-directory: ttsd
        run: uv run python -m pytest
